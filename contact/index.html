    <h1>Contact</h1>

    <form action="mailto:your-email@example.com" method="POST" enctype="text/plain">

        <label>
            Email:
            <input type="email" name="email" required>
        </label><br><br>

        <label>
            Subject:
            <input name="subject" required>
        </label><br><br>

        <label>
            Message:
            <textarea name="body" rows="5" required></textarea>
        </label><br><br>

        <button>Send</button>

    </form>
