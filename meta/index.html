<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Meta</title>

  <link rel="stylesheet" href="../style.css">

  <script type="module" src="../global.js"></script>
  <script type="module" src="meta.js"></script>
</head>

<body>

  <h1>Meta</h1>

  <p>
    This page includes stats about the code of this website.
  </p>

  <div id="stats"></div>

  <h2 class="no-underline">Evolution Over Time</h2>

  <div id="scrolly-1">
    <div id="left-col">
      <div id="scatter-story"></div>
    </div>

    <div id="right-col">
      <div id="scatter-plot">
        <header class="plot-header">
          <h2 class="no-underline">
            Commits by time of day
          </h2>
        </header>
        <div id="chart"></div>
        <p id="selection-count">
          No commits selected
        </p>
        <dl id="language-breakdown" class="stats"></dl>
      </div>
    </div>
  </div>

  <div id="file-scrolly">
    <div id="left">
      <div id="file-plot">
      <h2 class="no-underline">Codebase Evolution</h2>
      <dl id="files"></dl>
    </div>
  </div>

    <div id="right">
      <div id="file-story"></div>
    </div>
  </div>

  <!-- TOOLTIP -->
  <dl id="commit-tooltip" class="info tooltip" hidden>

    <dt>Commit</dt>
    <dd>
      <a href="" id="commit-link" target="_blank"></a>
    </dd>

    <dt>Date</dt>
    <dd id="commit-date"></dd>

    <dt>Time</dt>
    <dd id="commit-time"></dd>

    <dt>Author</dt>
    <dd id="commit-author"></dd>

    <dt>Lines Edited</dt>
    <dd id="commit-lines"></dd>

  </dl>
</body>
</html>
